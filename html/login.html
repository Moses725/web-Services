<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(
          to bottom,
          #000000 10%,
          #664972 43%,
          #a871be 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      form {
        background: linear-gradient(to top, #1a1a1a, #a871be);
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        margin-top: 3%;
        color: #fff;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 16px;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #a871be;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background-color 0.3s;
      }
      button:hover {
        background-color: #f23ce9;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(231, 233, 235, 0.3);
      }
      .hidden {
        display: none;
      }
      .logo {
        margin-bottom: 1rem;
        font-size: 4.4rem;
        color: #f6e0f5;
        text-transform: uppercase;
        font-family: "Orbitron", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="logo">AI-SOLUTION</div>
    <form id="login-form">
      <h2 style="text-align: center;">Login</h2>
      <input type="email" placeholder="Email" id="email" required />
      <input type="password" placeholder="Password" id="password" required />
      <button type="submit">Login</button>
    </form>

    <!-- Email Confirmation Notice -->
    <div
      id="confirmation-screen"
      class="hidden"
      style="
        
        color: white;
        padding: 2rem;
        border-radius: 8px;
        margin-top: 2rem;
        text-align: center;
        max-width: 400px;
        font-size: larger;
      "
    >
      <p>We've sent a secure login link to your email.</p>
      <p>Please click the link in your inbox to continue.</p>
    </div>

    <!-- Welcome Loading Screen -->
    <div
      id="welcome-screen"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #fff;
        font-size: xx-large;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        flex-direction: column;
      "
    >
      <p id="welcome-message">Welcome...</p>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
      import {
        getAuth,
        sendSignInLinkToEmail,
        isSignInWithEmailLink,
        signInWithEmailLink,
      } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
      import bcrypt from "https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm";

      // Firebase Config
      const firebaseConfig = {
        apiKey: "AIzaSyAfuAPxTc9iduZB7_mZJZ7iLByaFETfZ9o",
        authDomain: "ai-solutions-5372b.firebaseapp.com",
        projectId: "ai-solutions-5372b",
        storageBucket: "ai-solutions-5372b.appspot.com",
        messagingSenderId: "383381500837",
        appId: "1:383381500837:web:1a3a75525536c105f72e4c",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      const form = document.getElementById("login-form");
      const confirmationScreen = document.getElementById("confirmation-screen");
      const welcomeScreen = document.getElementById("welcome-screen");
      const welcomeMessage = document.getElementById("welcome-message");

      const actionCodeSettings = {
        url: window.location.href,
        handleCodeInApp: true,
      };

      // Login step 1: Check email/password from Firestore
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
          const q = query(
            collection(db, "admins"),
            where("email", "==", email)
          );
          const snapshot = await getDocs(q);

          if (snapshot.empty) {
            alert("invalid email or password.");
            return;
          }

          const adminDoc = snapshot.docs[0];
          const admin = adminDoc.data();

          const passwordMatch = await bcrypt.compare(password, admin.password);
          if (!passwordMatch) {
            alert("Invalid password.");
            return;
          }

          // Save email + name to localStorage for post-link verification
          localStorage.setItem("emailForSignIn", email);
          localStorage.setItem("adminName", admin.name || "Admin");
          localStorage.setItem("adminEmail", email);
          localStorage.setItem("adminUID", admin.uid);

          // Send email link
          await sendSignInLinkToEmail(auth, email, actionCodeSettings);

          form.classList.add("hidden");
          confirmationScreen.classList.remove("hidden");
        } catch (err) {
          console.error("Login error:", err);
          alert("Login failed: " + err.message);
        }
      });

      // Handle login link click
      if (isSignInWithEmailLink(auth, window.location.href)) {
        const email = localStorage.getItem("emailForSignIn");
        const adminName = localStorage.getItem("adminName") || "Admin";

        if (!email) {
          alert("No email found. Please start login again.");
        } else {
          try {
            await signInWithEmailLink(auth, email, window.location.href);
            welcomeMessage.textContent = `Welcome, ${adminName}!`;
            welcomeScreen.style.display = "flex";

            setTimeout(() => {
              window.location.href = "admin.html";
            }, 2000);
          } catch (err) {
            console.error("Email link login error:", err);
            alert("The login link is invalid or expired.");
          }
        }
      }
    </script>
  </body>
</html>
