<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pending Reviews</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(to right, #1a1a1a, #a871be);
        color: #fff;
        padding: 40px;
        margin: 0;
      }

      h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      #review-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        max-width: 1200px;
        margin: auto;
      }

      .review-card {
        background: #fff;
        color: #000;
        padding: 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .review-card:hover {
        transform: scale(1.03);
      }

      /* Modal */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }

      .modal-content {
        background: #fff;
        color: #000;
        padding: 25px;
        border-radius: 12px;
        max-width: 500px;
        width: 90%;
      }

      .modal-content h3 {
        margin-top: 0;
      }

      .modal-content p {
        margin: 10px 0;
      }

      .modal-content button {
        margin-right: 10px;
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }

      .approve-btn {
        background: #2ecc71;
        color: white;
      }

      .delete-btn {
        background: #e74c3c;
        color: white;
      }

      .close-btn {
        background: #aaa;
        color: white;
      }
    </style>
  </head>
  <body>
    <h2>Pending Reviews</h2>
    <div id="review-list"></div>

    <!-- Modal -->
    <div id="review-modal" class="modal">
      <div class="modal-content" id="modal-content">
        <!-- Populated by JS -->
      </div>
    </div>

    <script type="module" src="/adminjs/pending-reviews.js"></script>
  </body>
</html>
