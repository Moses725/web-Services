<!DOCTYPE html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(to bottom, #1f1f1f, #6e42a2);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      h1 {
        color: #fff;
        margin-bottom: 30px;
        text-align: center;
      }

      form {
        background-color: #2c2c2c;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        margin-top: 5%;
      }
      .password-container {
        position: relative;
        display: flex;
        align-items: center;
      }

      .password-container input {
        flex: 1;
        padding-right: 2.5rem; /* space for the icon */
      }

      .toggle-password {
        position: absolute;
        right: 10px;
        color: #666;
        cursor: pointer;
        font-size: 1.1rem;
        transition: color 0.3s;
      }

      .toggle-password:hover {
        color: #000;
      }

      label {
        font-weight: bold;
        color: #fff;
        margin-bottom: 8px;
        display: block;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 16px;
      }

      input:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #a871be;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #f23ce9;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(231, 233, 235, 0.3);
      }

      @media (max-width: 480px) {
        #adminRegForm {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <form id="registeration-form">
      <h1>Registration Form</h1>
      <input type="text" id="name" placeholder="First Name" required />
      <input type="text" id="surname" placeholder="Surname" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="tel" id="phone" placeholder="Phone (+267...)" required />

      <div class="password-container">
        <input type="password" id="password" placeholder="Password" required />
        <i
          class="fa-solid fa-eye-slash toggle-password"
          id="toggle-password"
        ></i>
      </div>

      <button type="submit">Register Admin</button>
    </form>

    <script>
      const togglePassword = document.getElementById("toggle-password");
      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        togglePassword.classList.toggle("fa-eye");
        togglePassword.classList.toggle("fa-eye-slash");
      });
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

      // Import bcrypt.js
      import bcrypt from "https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm";

      const firebaseConfig = {
        apiKey: "AIzaSyAfuAPxTc9iduZB7_mZJZ7iLByaFETfZ9o",
        authDomain: "ai-solutions-5372b.firebaseapp.com",
        projectId: "ai-solutions-5372b",
        storageBucket: "ai-solutions-5372b.appspot.com",
        messagingSenderId: "383381500837",
        appId: "1:383381500837:web:1a3a75525536c105f72e4c",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const form = document.getElementById("registeration-form");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const surname = document.getElementById("surname").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value;

        try {
          // Check if email already exists
          const adminRef = collection(db, "admins");
          const q = query(adminRef, where("email", "==", email));
          const snapshot = await getDocs(q);
          if (!snapshot.empty) {
            alert("This email is already registered.");
            return;
          }

          // Generate UID manually
          const uid = crypto.randomUUID();

          // Hash password
          const salt = await bcrypt.genSalt(10);
          const hashedPassword = await bcrypt.hash(password, salt);

          // Save admin to Firestore
          await addDoc(collection(db, "admins"), {
            uid,
            name,
            surname,
            email,
            phone,
            password: hashedPassword,
            createdAt: serverTimestamp(),
          });

          alert("Admin registered successfully!");
          form.reset();
          window.location.href = "login.html";
        } catch (error) {
          console.error("Registration error:", error);
          alert("Error: " + error.message);
        }
      });
    </script>
  </body>
</html>
